name: Release

on:
  push:
    tags:
      - "*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release

      - name: Prepare release assets
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path dist -Force
          Copy-Item "target/release/powermode-tray.exe" "dist/powermode-tray.exe"
          Copy-Item "README.md" "dist/README.md"
          Compress-Archive -Path "dist/*" -DestinationPath "powermode-tray-$env:GITHUB_REF_NAME-windows-x86_64.zip"

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            powermode-tray-${{ github.ref_name }}-windows-x86_64.zip
